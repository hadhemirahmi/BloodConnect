{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'accueil' %}">
      <div style="width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <i class="fas fa-tint text-danger"></i>
      </div>
      <span class="fw-bold">BloodConnect</span>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link px-3" href="{% url 'accueil' %}">Accueil</a>
        </li>
        {% if user.is_authenticated %}
            {% if user.role == 'donneur' %}
                <li class="nav-item">
                  <a class="nav-link px-3" href="{% url 'dashboard_donneur' %}">Mon Espace</a>
                </li>
            {% elif user.role == 'hopital' %}
                <li class="nav-item">
                  <a class="nav-link px-3" href="{% url 'dashboard_hopital' %}">Portail Hôpital</a>
                </li>
            {% endif %}
            <li class="nav-item ms-lg-3">
                <a class="btn btn-outline-light btn-sm rounded-pill px-3" href="{% url 'logout' %}">Déconnexion</a>
            </li>
        {% else %}
            <li class="nav-item">
              <a class="nav-link px-3" href="{% url 'login' %}">Connexion</a>
            </li>
            <li class="nav-item ms-lg-2">
              <a class="btn btn-light btn-sm rounded-pill px-4 text-danger fw-bold" href="{% url 'register' %}">Inscription</a>
            </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
