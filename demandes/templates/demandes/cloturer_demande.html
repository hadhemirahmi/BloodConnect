{% extends 'base_hopital.html' %}

{% block title %}Clôturer Demande{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card-custom text-center">
            <h4 class="fw-bold mb-4">Confirmer la clôture</h4>
            <p>Êtes-vous sûr de vouloir clôturer cette demande urgente ? Cette action est irréversible.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-danger py-2 fw-bold">Oui, clôturer la demande</button>
                    <a href="{% url 'historique_demandes' %}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
