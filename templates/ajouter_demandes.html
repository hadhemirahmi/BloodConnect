{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une demande urgente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/stylefd.css' %}">
    <style>
        body {
            background-image: url("{% static 'images/s.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.95);
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #000000;
        }

        .navbar-custom {
            background-color: #dc3545;
        }

        .navbar-custom .navbar-brand {
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Navbar rouge -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    
    <!-- Logo + texte -->
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="/static/images/blood.jpg" alt="Logo" 
           width="40" height="40" 
           class="rounded-circle me-2">
      BloodConnect
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/demandes/">Demandes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/dons/">Dons</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/campagnes/">Campagnes</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<h2>Ajouter une demande urgente</h2>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Hôpital :</label>
            {{ form.hopital }}
        </div>

        <div class="mb-3">
            <label class="form-label">Groupe sanguin :</label>
            {{ form.groupe_sanguin }}
        </div>

        <div class="mb-3">
            <label class="form-label">Quantité :</label>
            {{ form.quantite }}
        </div>

        <div class="mb-3">
            <label class="form-label">Délai :</label>
            {{ form.delai }}
        </div>

        <div class="mb-3">
            <label class="form-label">Statut :</label>
            {{ form.statut }}
        </div>

        <div class="mb-3">
            <label class="form-label">Description :</label>
            {{ form.description }}
        </div>

        <button type="submit" class="btn btn-danger w-100">Enregistrer</button>
    </form>
</div>

</body>
</html>
