{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page d'accueil</title>
    <!-- Bootstrap 5 CSS -->
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Arrière-plan avec l'image sang.jpg */
            background-image: url("{% static 'images/sang.jpg' %}");
            background-size: cover;       /* L'image couvre tout l'écran */
            background-position: center;  /* Centre l'image */
            background-repeat: no-repeat; /* Pas de répétition */
            background-attachment: fixed; /* Image fixe quand on scrolle */
        }
    </style>

</head>
<body class="bg-light">

<!-- Navbar rouge -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    
    <!-- Logo + texte -->
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="/static/images/blood.jpg" alt="Logo" 
           width="40" height="40" 
           class="rounded-circle me-2">
      BloodConnect
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/demandes/">Demandes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/dons/">Dons</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/campagnes/">Campagnes</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contenu principal -->
<div class="container text-center mt-5">
    <h1 class="display-4 mb-3">Donnez aujourd’hui, sauvez demain !</h1>

<div class="d-flex justify-content-center gap-4 flex-wrap">
    <!-- Zone Demandes -->
    <a href="/demandes/" class="card-link">
        <div class="card-square">
            <img src="{% static 'images/d.jpg' %}" alt="Demandes">
            <span class="card-text">Demandes</span>
        </div>
    </a>

    <!-- Zone Dons -->
    <a href="/dons/" class="card-link">
        <div class="card-square">
            <img src="{% static 'images/do.jpg' %}" alt="Dons">
            <span class="card-text">Dons</span>
        </div>
    </a>

    <!-- Zone Campagnes -->
    <a href="/campagnes/" class="card-link">
        <div class="card-square">
            <img src="{% static 'images/b.jpg' %}" alt="Campagnes">
            <span class="card-text">Campagnes</span>
        </div>
    </a>

    <!-- Zone Hôpitaux -->
    <a href="/hopitaux/" class="card-link">
        <div class="card-square">
            <img src="{% static 'images/h.jpg' %}" alt="Hôpitaux">
            <span class="card-text">Hôpitaux</span>
        </div>
    </a>
</div>
</div>

<!-- CSS à ajouter dans <style> -->
<style>
.card-link {
    text-decoration: none;
}

.card-square {
    width: 180px;
    height: 180px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}

.card-square img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-square:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

.card-text {
    position: absolute;
    color: white;
    font-weight: bold;
    background-color: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border-radius: 4px;
    bottom: 10px;
}
</style>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
