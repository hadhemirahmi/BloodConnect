<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — BloodConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 10px; }
    .table-card { transition: 0.3s; }
    .table-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .navbar { background: white; border-bottom: 2px solid #DC2626; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg py-3 sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Blood<span class="text-danger">Connect</span> <small class="text-muted fs-6">Admin Panel</small></a>
      <div class="ms-auto">
        <a href="/admin/" class="btn btn-dark btn-sm me-2">Django Admin</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Déconnexion</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-4 mb-5">
      <div class="col-md-3">
        <div class="card p-3 bg-white shadow-sm border-start border-4 border-danger">
          <div class="text-muted small">Total Donneurs</div>
          <div class="fs-4 fw-bold">1,280</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 bg-white shadow-sm border-start border-4 border-primary">
          <div class="text-muted small">Hôpitaux inscrits</div>
          <div class="fs-4 fw-bold">45</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 bg-white shadow-sm border-start border-4 border-warning">
          <div class="text-muted small">En attente de validation</div>
          <div class="fs-4 fw-bold text-warning">7</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 bg-white shadow-sm border-start border-4 border-success">
          <div class="text-muted small">Dons ce mois-ci</div>
          <div class="fs-4 fw-bold">156</div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm p-4 mb-4">
      <h5 class="fw-bold mb-4">Établissements en attente de validation</h5>
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>Nom</th>
              <th>Ville</th>
              <th>Numéro d'agrément</th>
              <th>Date d'inscription</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-semibold">Clinique du Parc</td>
              <td>Ariana</td>
              <td>TN-2024-8822</td>
              <td>Aujourd'hui</td>
              <td>
                <button class="btn btn-success btn-sm me-1"><i class="bi bi-check-lg"></i></button>
                <button class="btn btn-danger btn-sm"><i class="bi bi-x-lg"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</body>
</html>
