<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe changé — BloodConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F9F5F4; font-family: 'Segoe UI', sans-serif; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4 p-md-5 text-center" style="width:100%; max-width:450px;">
    <div class="mb-3">
      <span class="display-4">✅</span>
    </div>
    <h1 class="h4 fw-bold">Mot de passe changé !</h1>
    <p class="text-muted small mt-3">
      Votre mot de passe a été mis à jour avec succès. 
      Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.
    </p>
    <a href="{% url 'login' %}" class="btn btn-danger w-100 mt-4 rounded-pill py-2 fw-semibold">Se connecter</a>
  </div>
</div>
</body>
</html>
