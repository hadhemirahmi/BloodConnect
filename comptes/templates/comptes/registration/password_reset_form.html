<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — BloodConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F9F5F4; font-family: 'Segoe UI', sans-serif; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .btn-danger { background: #DC2626; border-color: #DC2626; transition: 0.3s; }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4 p-md-5" style="width:100%; max-width:450px;">
    <div class="text-center mb-4">
      <h1 class="h4 fw-bold">Mot de passe oublié ?</h1>
      <p class="text-muted small">Entrez votre email pour recevoir un lien de réinitialisation.</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Adresse Email</label>
        <input type="email" name="email" class="form-control py-2" placeholder="votre@email.com" required>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-semibold py-2">Envoyer le lien</button>
    </form>
    
    <div class="text-center mt-3">
      <a href="{% url 'login' %}" class="small text-muted text-decoration-none">← Retour à la connexion</a>
    </div>
  </div>
</div>
</body>
</html>
