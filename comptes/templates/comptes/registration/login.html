<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — BloodConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F9F5F4; font-family: 'Segoe UI', sans-serif; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .btn-danger { background: #DC2626; border-color: #DC2626; transition: 0.3s; }
    .btn-danger:hover { background: #B91C1C; transform: translateY(-1px); }
    .form-control:focus { border-color: #DC2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }
    .logo-icon { width: 44px; height: 44px; background: #DC2626; border-radius: 12px;
                 display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4 p-md-5" style="width:100%; max-width:420px;">

    <div class="text-center mb-4">
      <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402
                     0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501
                     5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447
                     2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136
                     8.625-11 14.402z"/>
          </svg>
        </div>
        <span class="fw-bold fs-4">Blood<span style="color:#DC2626">Connect</span></span>
      </div>
      <h1 class="h5 fw-semibold mb-1">Bon retour !</h1>
      <p class="text-muted small">Connectez-vous à votre espace personnel</p>
    </div>

 
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2 small">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% if error %}
      <div class="alert alert-danger py-2 small fw-semibold text-center">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control py-2" placeholder="Votre identifiant" required>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label fw-semibold small">Mot de passe</label>
          <a href="{% url 'password_reset' %}" class="small text-danger text-decoration-none fw-semibold" style="font-size: 0.75rem;">Oublié ?</a>
        </div>
        <input type="password" name="password" class="form-control py-2" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-danger w-100 fw-semibold py-2 rounded-3 mt-3">
        Se connecter
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-muted mb-2">Pas encore de compte ?</p>
      <a href="{% url 'register' %}" class="btn btn-outline-dark btn-sm w-100 rounded-pill py-2">
        Créer un compte
      </a>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
