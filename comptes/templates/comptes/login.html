<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login — BloodConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #F9F5F4;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border-radius: 16px;
      border: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .btn-danger {
      background: #DC2626;
      border-color: #DC2626;
    }

    .btn-danger:hover {
      background: #B91C1C;
    }
  </style>
</head>

<body>

<div class="min-vh-100 d-flex align-items-center justify-content-center">

  <div class="card p-4" style="width: 100%; max-width: 420px;">

    <!-- Logo -->
    <div class="text-center mb-4">
      <h2>🩸 Blood<span style="color:#DC2626;">Connect</span></h2>
      <p class="text-muted">Connexion à votre compte</p>
    </div>

    <!-- Erreur -->
    {% if error %}
      <div class="alert alert-danger py-2 small">
        {{ error }}
      </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-danger w-100">
        Se connecter
      </button>
    </form>

    <hr>

    <p class="text-center small">
      Pas de compte ?
    </p>

    <div class="d-grid gap-2">
      <a href="{% url 'register_donneur' %}" class="btn btn-outline-danger btn-sm">
        Inscription Donneur
      </a>
      <a href="{% url 'register_hopital' %}" class="btn btn-outline-primary btn-sm">
        Inscription Hôpital
      </a>
    </div>

  </div>

</div>

</body>
</html>
