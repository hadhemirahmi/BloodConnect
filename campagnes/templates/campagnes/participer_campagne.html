{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>S'inscrire à une campagne | BloodConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .slot-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .slot-card:hover:not(.disabled) { border-color: #DC2626; background: #FEE2E2; }
        .slot-input:checked + .slot-card { border-color: #DC2626; background: #FEE2E2; }
        .disabled { opacity: 0.5; cursor: not-allowed; background: #F1F5F9; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <div class="d-flex align-items-start gap-4">
                        <div class="bg-danger text-white p-4 rounded-4">
                            <i class="fas fa-calendar-day fs-1"></i>
                        </div>
                        <div>
                            <h2 class="fw-bold mb-1">{{ campagne.nom }}</h2>
                            <p class="text-muted"><i class="fas fa-map-marker-alt"></i> {{ campagne.lieu }} | <i class="fas fa-clock"></i> {{ campagne.date|date:"d F Y" }}</p>
                            <span class="badge bg-danger">Groupes ciblés: {{ campagne.groupes_cibles }}</span>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4">Choisissez votre créneau horaire</h5>
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3">
                            {% for slot in slots %}
                                <div class="col-md-4">
                                    <input type="radio" name="creneau_index" value="{{ slot.index }}" id="slot_{{ slot.index }}" class="slot-input d-none" {% if slot.full %}disabled{% endif %} required>
                                    <label for="slot_{{ slot.index }}" class="slot-card card p-3 h-100 text-center {% if slot.full %}disabled{% endif %}">
                                        <span class="fw-bold fs-5">{{ slot.time }}</span>
                                        <span class="small text-muted">{{ slot.nb_inscrits }} / {{ campagne.capacite_par_creneau }} inscrits</span>
                                        {% if slot.full %}
                                            <span class="badge bg-secondary mt-2">Complet</span>
                                        {% endif %}
                                    </label>
                                </div>
                            {% endfor %}
                        </div>

                        <div class="mt-5 d-flex gap-3">
                            <button type="submit" class="btn btn-danger btn-lg px-5 rounded-pill shadow">Confirmer mon inscription</button>
                            <a href="{% url 'dashboard_donneur' %}" class="btn btn-link text-muted mt-2">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
